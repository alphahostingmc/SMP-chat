<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP Private Chat</title>
    <!-- Include PubNub SDK for Real-time Chat Functionality -->
    <script src="https://pubnub.com"></script>
    <!-- Link to your external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <h2>SMP Chat Access</h2>
        <input type="text" id="mc-username" placeholder="Minecraft Username" required>
        <input type="text" id="first-name" placeholder="First Name" required>
        <button onclick="attemptLogin()">Enter Chat</button>
        <div id="error-msg">Access Denied: Username not whitelisted.</div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen">
        <header>
            <h2 id="chat-title">Stable SMP</h2>
            <div class="header-controls">
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️ Light Mode</button>
                <select id="smp-selector" onchange="switchChannel()">
                    <option value="stable-smp">Stable SMP</option>
                    <option value="pi-smp">Pi SMP</option>
                </select>
            </div>
        </header>
        <div id="chat-box"></div>
        <footer>
            <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </footer>
    </div>

    <!-- Link to your external JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
